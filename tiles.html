<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Rhythm Game Evoluído</title>

<style>
body {
  margin:0;
  background: radial-gradient(circle at top, #0f2027, #000);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}

#game {
  width:360px;
  height:620px;
  background:#0a0a0f;
  border-radius:20px;
  overflow:hidden;
  position:relative;
  box-shadow:0 0 40px rgba(0,255,255,0.2);
}

/* LINHA */
#line {
  position:absolute;
  bottom:130px;
  width:100%;
  height:6px;
  background:#ff0040;
  box-shadow:0 0 20px #ff0040;
}

/* HIT ZONE */
#hitZone {
  position:absolute;
  bottom:110px;
  width:100%;
  height:50px;
  background:rgba(255,0,64,0.1);
}

/* NOTAS */
.tile {
  position:absolute;
  width:25%;
  height:100px;
  background:linear-gradient(180deg,#00ffff,#0077ff);
  border-radius:10px;
  box-shadow:0 0 12px #00ffff;
}

/* TECLAS */
.key {
  position:absolute;
  bottom:0;
  width:25%;
  height:130px;
  background:#111;
  color:#0ff;
  text-align:center;
  line-height:130px;
  font-size:26px;
  transition:0.1s;
  cursor:pointer;
}

.key.active {
  background:#0ff;
  color:black;
  transform:scale(0.9);
}

/* HUD */
#score {
  position:absolute;
  top:10px;
  left:10px;
  color:#0ff;
}

#feedback {
  position:absolute;
  top:50%;
  width:100%;
  text-align:center;
  font-size:32px;
  color:#0ff;
  opacity:0;
  transition:0.2s;
}
</style>
</head>

<body>

<div id="game">
  <div id="score">0</div>
  <div id="feedback"></div>

  <div id="hitZone"></div>
  <div id="line"></div>

  <div class="key" id="k0" style="left:0%"></div>
  <div class="key" id="k1" style="left:25%"></div>
  <div class="key" id="k2" style="left:50%"></div>
  <div class="key" id="k3" style="left:75%"></div>
</div>

<script>
const scoreEl = document.getElementById("score");
const feedback = document.getElementById("feedback");

let tiles = [];
let score = 0;
let speed = 3;
let spawnRate = 700;
let running = true;

let keyMap = ["a","s","w","d"];
let changing = null;

const lineY = 490;

/* UI */
function updateKeys() {
  for (let i = 0; i < 4; i++) {
    document.getElementById("k"+i).innerText = keyMap[i].toUpperCase();
  }
}
updateKeys();

/* MUDAR TECLA */
for (let i = 0; i < 4; i++) {
  document.getElementById("k"+i).onclick = () => {
    changing = i;
    alert("Pressione a nova tecla");
  };
}

/* FEEDBACK */
function show(text){
  feedback.innerText = text;
  feedback.style.opacity = 1;
  setTimeout(()=>feedback.style.opacity=0,200);
}

/* DIFICULDADE PROGRESSIVA */
function increaseDifficulty() {
  speed += 0.2;
  spawnRate -= 20;

  if (spawnRate < 200) spawnRate = 200;
}

/* SPAWN */
let last = 0;
function spawn(){
  let now = Date.now();
  if (now - last < spawnRate) return;
  last = now;

  let lane = Math.floor(Math.random()*4);

  let t = document.createElement("div");
  t.className = "tile";
  t.style.left = (lane*25)+"%";
  t.style.top = "-100px";
  t.lane = lane;
  t.clicked = false;

  document.getElementById("game").appendChild(t);
  tiles.push(t);
}

/* MOVE */
function move(){
  tiles.forEach((t,i)=>{
    let top = parseInt(t.style.top);
    top += speed;
    t.style.top = top+"px";

    if (top > 620){
      if (!t.clicked) miss();
      t.remove();
      tiles.splice(i,1);
    }
  });
}

/* HIT */
function hit(lane){
  let best = null;
  let bestDiff = 999;

  tiles.forEach(t=>{
    if (t.lane !== lane || t.clicked) return;

    let top = parseInt(t.style.top);
    let bottom = top + 100;
    let diff = Math.abs(bottom - lineY);

    if (diff < bestDiff){
      bestDiff = diff;
      best = t;
    }
  });

  if (!best) return miss();

  if (bestDiff < 30){
    score += 3;
    show("PERFECT");
  } else if (bestDiff < 80){
    score += 1;
    show("GOOD");
  } else {
    return miss();
  }

  best.clicked = true;
  best.style.background = "#555";
  scoreEl.innerText = score;
}

/* INPUT */
document.addEventListener("keydown",(e)=>{

  if (changing !== null) {
    keyMap[changing] = e.key;
    changing = null;
    updateKeys();
    return;
  }

  if (!running) return;

  keyMap.forEach((k,i)=>{
    if (e.key === k){
      press(i);
      hit(i);
    }
  });
});

/* ANIMAÇÃO */
function press(i){
  let el = document.getElementById("k"+i);
  el.classList.add("active");
  setTimeout(()=>el.classList.remove("active"),100);
}

/* MISS */
function miss(){
  show("MISS");
  gameOver();
}

/* GAME OVER */
function gameOver(){
  running=false;

  setTimeout(()=>{
    alert("Score: "+score);

    tiles.forEach(t=>t.remove());
    tiles=[];
    score=0;
    speed=3;
    spawnRate=700;

    scoreEl.innerText=score;

    running=true;
  },100);
}

/* LOOP */
let difficultyTimer = 0;

function loop(){
  if (running){
    spawn();
    move();

    difficultyTimer++;
    if (difficultyTimer > 300) {
      increaseDifficulty();
      difficultyTimer = 0;
    }
  }
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
